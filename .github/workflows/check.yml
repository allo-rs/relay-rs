name: Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo clippy (deny warnings)
        run: |
          cargo clippy --all-targets \
            -p relay-proto -p relay-master -p relay-node -- -D warnings

      - name: cargo test (workspace)
        run: cargo test --workspace

  migrations:
    name: apply migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: relay
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - name: apply twice (idempotency check)
        env:
          PGPASSWORD: postgres
        run: |
          for i in 1 2; do
            echo "=== run $i ==="
            for f in crates/master/migrations/*.sql; do
              echo "-- applying $f"
              psql -h localhost -U postgres -d relay -v ON_ERROR_STOP=1 -f "$f"
            done
          done
          psql -h localhost -U postgres -d relay -c "\dt"

  smoke:
    name: end-to-end smoke (master + node)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: relay
          POSTGRES_USER: relay
          POSTGRES_PASSWORD: relay
        ports: ['25432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install psql + nc
        run: sudo apt-get update && sudo apt-get install -y postgresql-client netcat-openbsd
      - name: run smoke
        env:
          DATABASE_URL: postgresql://relay:relay@127.0.0.1:25432/relay
          RUST_LOG: info
        run: bash scripts/smoke.sh
