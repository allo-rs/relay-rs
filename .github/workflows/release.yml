name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact: relay-rs-x86_64-unknown-linux-musl
          - target: aarch64-unknown-linux-musl
            artifact: relay-rs-aarch64-unknown-linux-musl

    steps:
      - uses: actions/checkout@v6

      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 构建前端
        working-directory: panel
        run: bun install --frozen-lockfile && bun run build

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 缓存 Cargo 依赖
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: 安装 Zig（用于 musl 交叉编译）
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: 安装 cargo-zigbuild（预编译二进制）
        uses: cargo-bins/cargo-binstall@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: cargo binstall cargo-zigbuild --no-confirm --quiet

      - name: 编译
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: 重命名产物
        run: cp target/${{ matrix.target }}/release/relay-rs ${{ matrix.artifact }}

      - name: 上传 artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: 发布 Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: 下载所有 artifact
        uses: actions/download-artifact@v6
        with:
          path: artifacts
          merge-multiple: true

      - name: 发布到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
